# ~/services/docker-compose.yml の完成形サンプル
# 既存の services / volumes に以下をマージする

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - ../nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - countup
    networks:
      - app-network
    restart: always

  countup:
    build:
      context: ./app1
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_ACCESS_TOKEN: ${VITE_ACCESS_TOKEN}
    container_name: countup
    expose:
      - "3000"
    depends_on:
      - countup-php
    networks:
      - app-network
    restart: always

  countup-php:
    build:
      context: ./app1
      dockerfile: docker/php/Dockerfile
    container_name: countup-php
    environment:
      DATA_DIR: /var/www/data
    volumes:
      - counter_data:/var/www/data
    networks:
      - app-network
    restart: always

volumes:
  counter_data:

networks:
  app-network:
    external: true
