# ~/services/docker-compose.yml に追記するスニペット
#
# services: の中に以下を追加する
# volumes:  の中に counter_data: を追加する
# nginx サービスの depends_on に countup を追加する

services:
  countup:
    build:
      context: ./app1
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_ACCESS_TOKEN: ${VITE_ACCESS_TOKEN}
    container_name: countup
    expose:
      - "80"
    depends_on:
      - countup-php
    networks:
      - app-network
    restart: always

  countup-php:
    build:
      context: ./app1
      dockerfile: docker/php/Dockerfile
    container_name: countup-php
    environment:
      DATA_DIR: /var/www/data
    volumes:
      - counter_data:/var/www/data
    networks:
      - app-network
    restart: always

volumes:
  counter_data:
