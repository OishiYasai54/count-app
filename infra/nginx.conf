# /home/deploy/nginx/conf.d/app1.conf としてコピーして使う
# cp /home/deploy/services/app1/infra/nginx.conf /home/deploy/nginx/conf.d/app1.conf

server {
    listen 80;
    server_name counter.example.com;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name counter.example.com;

    ssl_certificate     /etc/letsencrypt/live/counter.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/counter.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://countup:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
