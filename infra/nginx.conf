# ~/nginx/conf.d/counter.conf としてコピーして使う
# cp ~/services/app1/infra/nginx.conf ~/nginx/conf.d/counter.conf

server {
    listen 80;
    server_name counter.example.com;

    # HTTP → HTTPS リダイレクト
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name counter.example.com;

    ssl_certificate     /root/nginx/ssl/counter.example.com.crt;
    ssl_certificate_key /root/nginx/ssl/counter.example.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
