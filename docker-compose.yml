# ローカル開発用
# VPS デプロイは infra/compose-fragment.yml を ~/services/docker-compose.yml に追記する

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_ACCESS_TOKEN: ${VITE_ACCESS_TOKEN}
    ports:
      - "3001:80"
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      DATA_DIR: /var/www/data
    volumes:
      - counter_data:/var/www/data
    restart: unless-stopped

volumes:
  counter_data:
