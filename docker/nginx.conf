server {
    listen 3000;
    root /var/www/html;
    index index.html;

    # Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP API → 同コンテナ内の PHP-FPM へ
    location /api/ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www$fastcgi_script_name;
        include fastcgi_params;
    }
}
