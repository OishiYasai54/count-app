server {
    listen 3000;
    root /var/www/html;
    index index.html;

    # Vue SPA: 存在しないパスはすべて index.html へ
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP API: PHP-FPM コンテナへ転送
    # $fastcgi_script_name = /api/count.php
    # → SCRIPT_FILENAME = /var/www/api/count.php
    location /api/ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www$fastcgi_script_name;
        include fastcgi_params;
    }
}
